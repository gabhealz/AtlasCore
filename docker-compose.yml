services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atlas_core
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_core"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas_dev@db:5432/atlas_core
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-atlas-core-dev-secret-change-in-production}
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
